<!DOCTYPE html>
<html lang="en">
<head>

<title>AI Academy – Learn AI Like a Pro!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #0ea5e9; --purple: #8b5cf6; --pink: #ec4899;
    --yellow: #fbbf24; --green: #22c55e; --orange: #f97316;
    --dark: #1e1b4b; --card-bg: #ffffff; --body-bg: #f0f4ff;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--body-bg); color: var(--dark); min-height: 100vh; }

  header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(139,92,246,.35) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(14,165,233,.3) 0%, transparent 55%); }
  .header-inner { position: relative; display: flex; align-items: center; justify-content: space-between; max-width: 1100px; margin: 0 auto; padding: 18px 32px; }
  .logo { font-family: 'Fredoka One', cursive; font-size: 2rem; color: #fff; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
  .xp-bar-wrap { display: flex; align-items: center; gap: 12px; }
  .xp-label { color: #c4b5fd; font-weight: 700; font-size: .9rem; }
  .xp-track { width: 160px; height: 14px; background: rgba(255,255,255,.2); border-radius: 99px; overflow: hidden; }
  .xp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #fbbf24, #f97316); border-radius: 99px; transition: width .8s cubic-bezier(.4,0,.2,1); }
  .xp-num { color: #fbbf24; font-weight: 800; font-size: .9rem; min-width: 70px; text-align: right; }
  .hero { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 60%, #4c1d95 100%); padding: 48px 32px 64px; text-align: center; position: relative; overflow: hidden; }
  .hero::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 50px; background: var(--body-bg); clip-path: ellipse(55% 100% at 50% 100%); }
  .hero-badge { display: inline-block; background: rgba(139,92,246,.25); border: 1.5px solid rgba(139,92,246,.5); color: #c4b5fd; padding: 6px 18px; border-radius: 99px; font-size: .85rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 18px; }
  .hero h1 { font-family: 'Fredoka One', cursive; font-size: clamp(2.2rem, 5vw, 3.4rem); color: #fff; line-height: 1.15; margin-bottom: 16px; }
  .hero h1 em { color: #fbbf24; font-style: normal; }
  .hero p { color: #c4b5fd; font-size: 1.1rem; max-width: 580px; margin: 0 auto 32px; line-height: 1.7; }
  .hero-mascot { font-size: 5rem; display: block; margin: 0 auto 24px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-14px);} }
  .progress-section { max-width: 1100px; margin: 0 auto; padding: 40px 24px 8px; }
  .progress-section h2 { font-family: 'Fredoka One', cursive; font-size: 1.6rem; margin-bottom: 20px; color: var(--dark); }
  .module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 22px; }
  .section-divider { grid-column: 1 / -1; display: flex; align-items: center; gap: 16px; margin: 12px 0 4px; }
  .section-divider-line { flex: 1; height: 2px; background: linear-gradient(90deg,#e2e8f0,transparent); }
  .section-divider-line.right { background: linear-gradient(270deg,#e2e8f0,transparent); }
  .section-divider-badge { font-family: 'Fredoka One', cursive; font-size: .95rem; color: #fff; background: linear-gradient(135deg,#1e1b4b,#4c1d95); padding: 6px 20px; border-radius: 99px; white-space: nowrap; }
  .module-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; cursor: pointer; transition: transform .22s, box-shadow .22s; position: relative; }
  .module-card:hover { transform: translateY(-5px); box-shadow: 0 18px 48px rgba(30,27,75,.18); }
  .module-card.completed .card-header::after { content: '✅'; position: absolute; top: 12px; right: 14px; font-size: 1.5rem; }
  .card-header { padding: 24px 22px 18px; position: relative; }
  .card-icon { font-size: 2.8rem; margin-bottom: 10px; display: block; }
  .card-title { font-family: 'Fredoka One', cursive; font-size: 1.25rem; margin-bottom: 6px; }
  .card-desc { font-size: .9rem; color: #64748b; line-height: 1.55; }
  .card-footer { padding: 12px 22px 18px; border-top: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
  .lessons-count { font-size: .82rem; font-weight: 700; color: #94a3b8; }
  .progress-pill { font-size: .8rem; font-weight: 800; padding: 4px 12px; border-radius: 99px; color: #fff; }
  .theme-sky .card-header{background:linear-gradient(135deg,#e0f2fe,#f0f9ff);} .theme-sky .card-title{color:#0369a1;} .theme-sky .progress-pill{background:var(--sky);}
  .theme-purple .card-header{background:linear-gradient(135deg,#ede9fe,#f5f3ff);} .theme-purple .card-title{color:#6d28d9;} .theme-purple .progress-pill{background:var(--purple);}
  .theme-pink .card-header{background:linear-gradient(135deg,#fce7f3,#fdf2f8);} .theme-pink .card-title{color:#be185d;} .theme-pink .progress-pill{background:var(--pink);}
  .theme-green .card-header{background:linear-gradient(135deg,#dcfce7,#f0fdf4);} .theme-green .card-title{color:#15803d;} .theme-green .progress-pill{background:var(--green);}
  .theme-yellow .card-header{background:linear-gradient(135deg,#fef9c3,#fefce8);} .theme-yellow .card-title{color:#a16207;} .theme-yellow .progress-pill{background:var(--yellow);color:#1e1b4b;}
  .theme-orange .card-header{background:linear-gradient(135deg,#ffedd5,#fff7ed);} .theme-orange .card-title{color:#c2410c;} .theme-orange .progress-pill{background:var(--orange);}
  .theme-teal .card-header{background:linear-gradient(135deg,#ccfbf1,#f0fdfa);} .theme-teal .card-title{color:#0f766e;} .theme-teal .progress-pill{background:#0d9488;}
  .theme-indigo .card-header{background:linear-gradient(135deg,#e0e7ff,#eef2ff);} .theme-indigo .card-title{color:#4338ca;} .theme-indigo .progress-pill{background:#4f46e5;}
  .theme-rose .card-header{background:linear-gradient(135deg,#ffe4e6,#fff1f2);} .theme-rose .card-title{color:#be123c;} .theme-rose .progress-pill{background:#e11d48;}
  .theme-amber .card-header{background:linear-gradient(135deg,#fef3c7,#fffbeb);} .theme-amber .card-title{color:#b45309;} .theme-amber .progress-pill{background:#d97706;color:#1e1b4b;}
  .theme-cyan .card-header{background:linear-gradient(135deg,#cffafe,#ecfeff);} .theme-cyan .card-title{color:#0e7490;} .theme-cyan .progress-pill{background:#0891b2;}
  .theme-violet .card-header{background:linear-gradient(135deg,#ede9fe,#f5f3ff);} .theme-violet .card-title{color:#5b21b6;} .theme-violet .progress-pill{background:#7c3aed;}
  .overlay { position: fixed; inset: 0; background: rgba(15,10,40,.7); backdrop-filter: blur(6px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity .3s; padding: 16px; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: #fff; border-radius: 28px; max-width: 680px; width: 100%; max-height: 92vh; overflow-y: auto; box-shadow: 0 32px 80px rgba(15,10,40,.4); transform: translateY(30px) scale(.97); transition: transform .35s cubic-bezier(.4,0,.2,1); }
  .overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-header { padding: 30px 32px 20px; border-radius: 28px 28px 0 0; position: relative; }
  .modal-header .lesson-num { font-size: .78rem; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; opacity: .65; margin-bottom: 6px; }
  .modal-header h2 { font-family: 'Fredoka One', cursive; font-size: 1.9rem; line-height: 1.2; }
  .modal-body { padding: 0 32px 32px; }
  .close-btn { position: absolute; top: 18px; right: 20px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #94a3b8; }
  .close-btn:hover { color: var(--dark); }
  .stars-display { display: flex; gap: 4px; font-size: 1.2rem; margin-top: 8px; }
  .lesson-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; padding-top: 4px; }
  .lesson-tab { padding: 7px 16px; border-radius: 99px; font-weight: 700; font-size: .85rem; border: 2px solid #e2e8f0; background: none; cursor: pointer; color: #64748b; transition: all .18s; }
  .lesson-tab.active,.lesson-tab:hover { background: var(--dark); border-color: var(--dark); color: #fff; }
  .lesson-tab.done { border-color: var(--green); color: var(--green); }

  .lesson-panel { display: none; }
  .lesson-panel.visible { display: block; }
  .lesson-panel h3 { font-family: 'Fredoka One', cursive; font-size: 1.25rem; margin-bottom: 12px; color: var(--dark); }
  .lesson-panel p { color: #475569; line-height: 1.75; margin-bottom: 14px; font-size: .97rem; }

  .fun-fact::before { content: '💡 Fun Fact: '; }
  .tip-box { background: #f0fdf4; border-left: 4px solid var(--green); border-radius: 12px; padding: 14px 18px; margin: 16px 0; font-size: .93rem; color: #166534; font-weight: 600; }
  .tip-box::before { content: '✨ Tip: '; }
  .warning-box { background: #fef9c3; border-left: 4px solid var(--yellow); border-radius: 12px; padding: 14px 18px; margin: 16px 0; font-size: .93rem; color: #713f12; font-weight: 600; }
  .warning-box::before { content: '⚠️ Remember: '; }
  .quiz-block { background: #f8fafc; border-radius: 16px; padding: 22px 24px; margin: 16px 0; }
  .quiz-block h3 { font-size: 1rem; margin-bottom: 14px; color: var(--dark); }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt { background: #fff; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 18px; cursor: pointer; font-weight: 600; font-size: .93rem; text-align: left; transition: all .18s; color: var(--dark); }
  .quiz-opt:hover:not([disabled]) { border-color: var(--purple); background: #f5f3ff; }
  .quiz-opt.correct { background: #dcfce7; border-color: var(--green); color: #166534; }
  .quiz-opt.wrong   { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
  .quiz-feedback { margin-top: 12px; font-weight: 700; font-size: .93rem; display: none; }
  .quiz-feedback.show { display: block; }
  .quiz-feedback.ok { color: var(--green); }
  .quiz-feedback.bad { color: #ef4444; }
  .prompt-practice { background: #1e1b4b; border-radius: 16px; padding: 22px 24px; margin: 16px 0; }
  .prompt-practice h3 { color: #c4b5fd; font-size: 1rem; margin-bottom: 6px; }
  .prompt-practice p { color: #94a3b8; font-size: .88rem; margin-bottom: 14px; }
  .prompt-input-wrap { display: flex; gap: 10px; align-items: flex-end; }
  .prompt-textarea { flex: 1; background: rgba(255,255,255,.1); border: 1.5px solid rgba(139,92,246,.4); border-radius: 12px; color: #e2e8f0; padding: 12px 14px; font-family: 'Nunito',sans-serif; font-size: .93rem; resize: vertical; min-height: 70px; transition: border-color .2s; }
  .prompt-textarea:focus { outline: none; border-color: #8b5cf6; }
  .send-btn { background: linear-gradient(135deg,#8b5cf6,#6d28d9); color: #fff; border: none; border-radius: 12px; padding: 14px 20px; cursor: pointer; font-family: 'Nunito',sans-serif; font-weight: 800; font-size: 1.1rem; transition: transform .15s; }
  .send-btn:hover { transform: translateY(-2px); }
  .ai-response-wrap { margin-top: 14px; display: none; }
  .ai-response-wrap.show { display: block; }
  .ai-response { background: rgba(255,255,255,.08); border-radius: 12px; padding: 14px 16px; color: #e2e8f0; font-size: .9rem; line-height: 1.7; }
  .prompt-score { margin-top: 10px; font-size: .85rem; font-weight: 700; color: #22c55e; }
  .complete-btn { background: linear-gradient(135deg,#22c55e,#16a34a); color: #fff; border: none; border-radius: 14px; padding: 16px 36px; font-family: 'Fredoka One',cursive; font-size: 1.2rem; cursor: pointer; margin-top: 28px; width: 100%; transition: transform .15s; letter-spacing: .5px; }
  .complete-btn:hover { transform: translateY(-2px); }
  .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg,#1e1b4b,#312e81); color: #fff; border-radius: 20px; padding: 16px 28px; display: flex; align-items: center; gap: 14px; box-shadow: 0 12px 48px rgba(0,0,0,.35); font-weight: 700; font-size: 1rem; z-index: 999; transition: transform .5s cubic-bezier(.34,1.56,.64,1); white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast-icon { font-size: 2rem; }
  @media(max-width:600px){.header-inner{padding:14px 18px;}.logo{font-size:1.4rem;}.xp-track{width:100px;}.progress-section{padding:28px 14px 8px;}.modal-header,.modal-body{padding-left:20px;padding-right:20px;}}
</style>
</head>

<script>
const M=`<h3>`;const modules=[
{id:0,theme:'theme-sky',icon:'🧠',title:'What IS Artificial Intelligence?',desc:"Discover what AI really means and how it's different from regular computer programs.",xp:100,lessons:[
{title:'Computers That Learn',content:'<h3>What is AI?</h3><p>You\'ve probably heard the word "AI" — maybe in movies, games, or from grown-ups talking about cool new technology. But what does it actually mean?</p><p><strong>AI stands for Artificial Intelligence.</strong> "Artificial" means made by humans, and "Intelligence" means the ability to learn, solve problems, and make decisions. So AI is a computer system that can do things that normally require human thinking!</p><div class="fun-fact">Unlike a calculator that only does what you tell it, an AI can learn from examples — just like you learn from experience!</div><h3>Regular Programs vs. AI</h3><ul><li>🖩 A regular calculator follows exact rules: press 2 + 2, always get 4.</li><li>🤖 An AI learns patterns: show it thousands of cat photos and it learns to recognize cats — even ones it has never seen before!</li></ul><p>Think of it like teaching a friend. Once they learn the idea, they can apply it to new situations. That\'s AI!</p>'},
{title:'AI All Around You',content:'<h3>Where Do You Already Use AI?</h3><p>AI is already part of your everyday life — you might just not have noticed!</p><ul><li>🎵 <strong>Music apps</strong> recommending songs you\'ll like</li><li>🎮 <strong>Video game enemies</strong> that respond to how you play</li><li>📸 <strong>Camera apps</strong> that recognize faces and smile for photos</li><li>🔍 <strong>Search engines</strong> guessing what you\'re looking for</li><li>📺 <strong>Streaming services</strong> suggesting your next show</li><li>🗣️ <strong>Voice assistants</strong> like Siri or Alexa</li></ul><div class="tip-box">AI is a tool — like a hammer or a pencil. How useful it is depends on how well you use it!</div>',quiz:{q:'Which of these is an example of AI in everyday life?',options:[{text:'🧮 A basic calculator doing 5 × 5',correct:false},{text:'🎵 A music app that learns your taste and recommends songs',correct:true},{text:'💡 A light switch turning a lamp on',correct:false},{text:'⏰ An alarm clock going off at 7am',correct:false}],feedback:{ok:"Correct! The music app learns from your listening habits — that's AI!",bad:'Not quite. The other options follow fixed rules with no learning.'}}},
{title:'How Does AI Learn?',content:'<h3>Teaching a Machine</h3><p>How does an AI actually get smart? Through something called <strong>training</strong>. This is where humans show the AI millions of examples so it can find patterns.</p><ul><li>You show them 1,000 photos labeled "dog" 🐕</li><li>You show them 1,000 photos labeled "not a dog" 🐈</li><li>Eventually they learn what makes a dog a dog — pointy ears, fur, paws…</li><li>Now they can spot a dog they\'ve never seen before!</li></ul><p>AI works the same way, but with millions or even billions of examples.</p><div class="fun-fact">The AI model you might be using today was trained on more text than any human could read in thousands of lifetimes!</div><div class="warning-box">AI learns from the data it\'s given. If that data has mistakes or biases, the AI can learn those too. That\'s why humans need to check AI\'s work!</div>',quiz:{q:'What is "training" an AI?',options:[{text:'🏋️ Making a robot do push-ups',correct:false},{text:'📚 Showing an AI millions of examples so it finds patterns',correct:true},{text:'⌨️ Writing special computer code by hand',correct:false},{text:'🔌 Plugging in a computer',correct:false}],feedback:{ok:'You got it! Training = teaching through tons of examples.',bad:'Not quite! Training means feeding the AI lots of examples to learn from.'}}}
]},
{id:1,theme:'theme-purple',icon:'💬',title:'Talking to AI: The Art of Prompts',desc:'Learn how to ask AI great questions and get amazing answers.',xp:100,lessons:[
{title:'What is a Prompt?',content:'<h3>The Magic Word: Prompt</h3><p>When you talk to an AI, what you type or say is called a <strong>prompt</strong>. It\'s like giving the AI a task or asking it a question.</p><p>The cool thing? <em>How</em> you write your prompt changes the answer you get — a lot!</p><p>Think of the AI like a super-knowledgeable genie. If you say "I want something to eat," you might get anything. But if you say "I want a cheese pizza with mushrooms," you get exactly what you want!</p><div class="tip-box">The better your prompt, the better the AI\'s response. This is called "prompt engineering" and it\'s a real skill!</div><h3>Parts of a Good Prompt</h3><ul><li>🎯 <strong>Be specific</strong> — tell the AI exactly what you need</li><li>🧩 <strong>Give context</strong> — help it understand the situation</li><li>📏 <strong>Set the format</strong> — ask for a list, a story, steps, etc.</li><li>👤 <strong>Give it a role</strong> — "Act as a science teacher and explain..."</li></ul>'},
{title:'Weak vs Strong Prompts',content:'<h3>Compare These Prompts!</h3><p>Look at how much better a strong prompt works:</p><table style="width:100%;border-collapse:collapse;margin:14px 0;font-size:.9rem;"><tr style="background:#f1f5f9;"><th style="padding:10px;text-align:left;color:#6d28d9">😴 Weak Prompt</th><th style="padding:10px;text-align:left;color:#22c55e">💪 Strong Prompt</th></tr><tr style="border-bottom:1px solid #f1f5f9;"><td style="padding:10px;color:#64748b">Tell me about space.</td><td style="padding:10px;color:#374151">Explain what a black hole is in simple terms for a 10-year-old, using one fun analogy.</td></tr><tr style="border-bottom:1px solid #f1f5f9;"><td style="padding:10px;color:#64748b">Write a story.</td><td style="padding:10px;color:#374151">Write a 3-paragraph adventure story about a girl who discovers she can talk to animals, set in a forest.</td></tr><tr><td style="padding:10px;color:#64748b">Help with math.</td><td style="padding:10px;color:#374151">I\'m a 6th grader stuck on fractions. Explain how to add 1/3 + 1/4 step by step with an easy example.</td></tr></table><div class="fun-fact">Professional "prompt engineers" get paid to write great prompts for AI systems. It\'s a real job!</div>',quiz:{q:'Which prompt will get the most helpful response from an AI?',options:[{text:'"Tell me about animals."',correct:false},{text:'"Write something cool."',correct:false},{text:'"Explain why dolphins are so smart, in bullet points, like I\'m in 5th grade."',correct:true},{text:'"Stuff about school."',correct:false}],feedback:{ok:'Perfect! Specific, with context and format = a great prompt!',bad:'Think about specificity! The more detail you give, the better the answer.'}}},
{title:'Practice Prompting!',content:'<h3>Try It Yourself! 🎮</h3><p>Practice writing a great prompt. Use the tips you\'ve learned: be specific, give context, and set a format. The scorer will rate your prompt!</p>',practice:{scenario:'📚 You need help understanding the American Revolution for a school report.',hint:'Try including: your grade, what specifically you need, and what format you want the answer in.',placeholder:'Type your prompt here... e.g., "Explain the main causes of the American Revolution in 4 bullet points for a 5th grader..."'}}
]},
{id:2,theme:'theme-pink',icon:'🧐',title:'Can You Trust AI? Critical Thinking',desc:'AI is powerful but not perfect. Learn how to fact-check and think critically.',xp:100,lessons:[
{title:'AI Can Make Mistakes',content:'<h3>AI Isn\'t Always Right!</h3><p>Here\'s something really important: <strong>AI can be wrong.</strong> Sometimes confidently wrong! This is called a "hallucination" — when AI makes up facts that sound real but aren\'t.</p><ul><li>🤥 It might invent a book title that doesn\'t exist</li><li>📅 It might get historical dates wrong</li><li>🔬 It might mix up scientific facts</li><li>👤 It might confuse two people with similar names</li></ul><div class="warning-box">Never turn in AI-written homework without reading it carefully. Mistakes can be embarrassing — or even hurtful if they\'re about real people or events.</div><h3>Why Does AI Hallucinate?</h3><p>AI doesn\'t "know" things like you do. It predicts what word should come next based on patterns from its training. Sometimes those patterns lead it to confidently say something that just isn\'t true.</p>'},
{title:'How to Fact-Check AI',content:'<h3>Be an AI Detective 🔍</h3><p>Whenever AI gives you important facts, follow these steps:</p><ul><li>1️⃣ <strong>Ask "How would you know?"</strong> — Is this something the AI could reasonably know, or is it guessing?</li><li>2️⃣ <strong>Check a trusted source</strong> — encyclopedia, library website, textbook, or ask a teacher</li><li>3️⃣ <strong>Look for specifics</strong> — vague answers can be a sign the AI is unsure</li><li>4️⃣ <strong>Ask AI to explain its reasoning</strong> — "How do you know this?"</li><li>5️⃣ <strong>Cross-check with two sources</strong> — if two trusted sources agree, it\'s likely true</li></ul><div class="tip-box">You can even ask the AI: "How confident are you in this answer, and what should I verify?" It\'s often honest about uncertainty!</div>',quiz:{q:'Your AI says a famous person was born in 1850. What should you do?',options:[{text:'📝 Copy it straight into your report — AI is always right!',correct:false},{text:'🔍 Verify the birth year using a library, encyclopedia, or trusted website',correct:true},{text:'🤷 Ignore the date entirely',correct:false},{text:'❌ Never use AI for school again',correct:false}],feedback:{ok:'Exactly right! Always verify important facts from AI.',bad:'Remember: AI can make mistakes. Always fact-check important information!'}}},
{title:'Bias in AI',content:'<h3>What is Bias?</h3><p>Bias means having an unfair lean toward one idea, group, or viewpoint. Because AI learns from human-created content — and humans have biases — AI can pick those biases up.</p><p>For example, an AI might describe certain jobs as belonging to one gender, or assume certain groups of people act in certain ways.</p><h3>How to Spot Bias</h3><ul><li>🔎 Does the answer seem to favor one group over another?</li><li>🌍 Does it only show one cultural perspective?</li><li>💬 Does it use language that feels unfair or stereotyping?</li></ul><div class="warning-box">If something an AI says feels unfair, biased, or stereotype-based — trust your gut and question it. Your critical thinking matters!</div><div class="tip-box">Try asking the AI the same question multiple ways, or ask it to "consider different perspectives" — this often gives a more balanced answer.</div>'}
]},
{id:3,theme:'theme-green',icon:'🛡️',title:'AI Safety & Privacy',desc:'Stay safe! Learn what to share (and what NOT to share) with AI.',xp:100,lessons:[
{title:'What NOT to Share with AI',content:'<h3>Private Information = Private!</h3><p>AI tools are often connected to the internet and may store what you type. That means you need to be careful about what personal information you share.</p><h3>🚫 Never share with AI:</h3><ul><li>🏠 Your home address or school address</li><li>📞 Your phone number</li><li>🔑 Passwords or account details</li><li>💳 Anything about credit cards or money</li><li>📸 Private photos or information about your family</li><li>🆔 Your full name + age + location all together</li></ul><div class="warning-box">A good AI will never need your personal information to answer school questions or help with creative projects!</div><div class="tip-box">Think of AI like a public library computer. You can use it for learning, but don\'t type your private info into it.</div>'},
{title:'AI and Deepfakes',content:'<h3>When AI Creates Fake Stuff</h3><p>AI can now create images, videos, and audio that look and sound completely real — but are totally made up! These are called <strong>deepfakes</strong>.</p><ul><li>🖼️ Fake photos of events that never happened</li><li>🎥 Videos of people saying things they never said</li><li>🎙️ Audio that sounds like a real person but is fake</li></ul><h3>How to Spot Fake AI Content</h3><ul><li>👁️ Look closely at hands, teeth, and hair — AI often gets these wrong</li><li>🔍 Does the background look normal?</li><li>🌐 Can you find the original source with a quick search?</li><li>🤔 Does this seem too shocking or unbelievable to be true?</li></ul><div class="fun-fact">The phrase "seeing is believing" is no longer always true! Now we have to think critically about images and videos just like we do with text.</div>',quiz:{q:'You see a shocking video of a celebrity supposedly saying something outrageous. What should you do?',options:[{text:'📲 Share it immediately with all your friends!',correct:false},{text:'😱 Believe it right away because it looks real',correct:false},{text:'🔍 Check trusted news sites to see if the event actually happened',correct:true},{text:'🙈 Ignore everything you see online',correct:false}],feedback:{ok:'Smart! Always verify shocking content before believing or sharing it.',bad:'Be careful! AI can create convincing fake videos. Always verify first.'}}},
{title:'Using AI Responsibly',content:'<h3>The AI Code of Conduct 📜</h3><p>With great power comes great responsibility! Here\'s how to be a responsible AI user:</p><ul><li>✅ <strong>Use AI to LEARN</strong> — not to avoid learning</li><li>✅ <strong>Be honest</strong> — tell teachers if you used AI to help</li><li>✅ <strong>Fact-check</strong> — don\'t spread information without verifying</li><li>✅ <strong>Be kind</strong> — don\'t use AI to write mean things about others</li><li>✅ <strong>Protect your privacy</strong> — guard your personal information</li><li>❌ <strong>Don\'t cheat</strong> — using AI to do your homework for you isn\'t fair to your own brain!</li></ul><div class="tip-box">Using AI to HELP you understand something is great. Using AI to DO your thinking for you means you miss out on the learning!</div>'}
]},
{id:4,theme:'theme-yellow',icon:'🎨',title:'AI as Your Creative Partner',desc:'Use AI to supercharge your creativity in writing, art, music, and more!',xp:100,lessons:[
{title:'AI for Creative Writing',content:'<h3>Your Story-Writing Superpower</h3><p>AI can be an amazing creative partner — not to write FOR you, but to spark ideas, help you get unstuck, or improve your work.</p><ul><li>💡 <strong>Brainstorm</strong> — "Give me 10 ideas for a story about a dragon who\'s afraid of fire"</li><li>✏️ <strong>First draft helper</strong> — "Help me start a story about..." then you take it further</li><li>📝 <strong>Feedback buddy</strong> — "Read my paragraph and tell me how to make it more exciting"</li><li>🔤 <strong>Vocabulary builder</strong> — "Give me 5 strong verbs I could use instead of \'walked\'"</li><li>🌍 <strong>World-builder</strong> — "Help me design the setting for a fantasy kingdom"</li></ul><div class="tip-box">The best stories come from YOUR ideas and feelings. Use AI as a creative tool, but let your imagination lead!</div>'},
{title:'AI for Art, Music & More',content:'<h3>AI Across the Arts</h3><p>AI can help with almost any creative project:</p><ul><li>🎨 <strong>Art</strong> — AI can generate images from text descriptions, helping you visualize ideas</li><li>🎵 <strong>Music</strong> — AI can suggest chord progressions, help with lyrics, or generate backing tracks</li><li>🎬 <strong>Videos</strong> — AI tools can help with scripts, captions, and even editing suggestions</li><li>🏗️ <strong>Game design</strong> — AI can help design characters, worlds, and storylines</li></ul><h3>Important: Give Credit!</h3><p>If you use AI to help create something, it\'s honest and respectful to say so. Just like you\'d credit a photo you found online, acknowledge when AI helped with your work.</p><div class="fun-fact">Many professional artists, musicians, and writers now use AI as a tool in their creative process — not as a replacement for their creativity!</div>',quiz:{q:'You use AI to help brainstorm ideas for your art project, then create the art yourself. What should you do?',options:[{text:'🤫 Tell no one — pretend you thought of everything yourself',correct:false},{text:'✅ Mention that you used AI for brainstorming, then created the work yourself',correct:true},{text:'❌ Never use AI for creative projects',correct:false},{text:'🤖 Let the AI finish the whole project',correct:false}],feedback:{ok:"Right! Be honest about how you used AI while being proud of your creative work.",bad:"Honesty matters! It's totally fine to use AI as a tool — just be transparent about it."}}},
{title:'Creative Prompt Challenge!',content:'<h3>Spark Your Imagination 🌟</h3><p>Try writing a creative prompt to ask the AI for a story idea. Make it as specific and interesting as possible!</p>',practice:{scenario:'✍️ You want an idea for a creative short story to share with your class.',hint:'Try including: the genre (adventure, mystery, sci-fi...), a unique main character, an interesting setting, and maybe a twist!',placeholder:'Write your story idea prompt here... e.g., "Give me a mystery story idea about a 12-year-old who discovers their town library has a secret basement that leads to..."'}}
]},
{id:5,theme:'theme-orange',icon:'🚀',title:'The Future with AI',desc:'Explore AI careers, the big questions about AI, and your future with this technology.',xp:100,lessons:[
{title:'AI Careers of the Future',content:'<h3>Cool Jobs That Involve AI</h3><p>AI is changing almost every career. Here are some exciting jobs where AI skills will matter:</p><ul><li>🩺 <strong>AI in Medicine</strong> — AI helps doctors spot diseases in scans and develop new medicines faster</li><li>🌍 <strong>AI in Climate Science</strong> — predicting weather, tracking wildfires, and designing clean energy solutions</li><li>🎮 <strong>AI in Game Design</strong> — creating smarter characters and more immersive worlds</li><li>🚗 <strong>AI in Transportation</strong> — self-driving cars, smarter traffic systems</li><li>📚 <strong>AI in Education</strong> — personalized learning that adapts to each student</li><li>🤖 <strong>AI Development</strong> — actually building and training AI systems</li></ul><div class="tip-box">Whatever career you choose, AI will likely be a tool in that field. Learning how to work WITH AI gives you a superpower!</div>'},
{title:'Big Questions About AI',content:'<h3>Things Even Adults Are Still Figuring Out</h3><p>AI raises some really big, important questions that smart people all around the world are working on:</p><ul><li>⚖️ <strong>Fairness</strong> — How do we make sure AI treats everyone equally?</li><li>🔒 <strong>Privacy</strong> — How much data should AI be allowed to collect?</li><li>💼 <strong>Jobs</strong> — Will AI replace some jobs? What new jobs will it create?</li><li>🧠 <strong>Thinking</strong> — Could AI ever truly think and feel like humans?</li><li>🌏 <strong>Power</strong> — Who should be allowed to build the most powerful AI?</li></ul><p>There are no easy answers to these questions — and that\'s exactly why we need smart, thoughtful people like YOU to help figure them out!</p><div class="fun-fact">The people making decisions about AI today want to hear from the generation that will live with it the longest — that\'s your generation!</div>',quiz:{q:'Why is it important for young people to learn about AI?',options:[{text:"🤷 It's not — only adults need to know about AI",correct:false},{text:"🚀 Because your generation will live and work with AI the most, and you can help shape how it's used",correct:true},{text:'📺 Just so you can watch better shows',correct:false},{text:'🎮 Only if you want to be a gamer',correct:false}],feedback:{ok:"Exactly! You have a real voice in how AI develops and is used in the future.",bad:"Think bigger! AI will be part of almost every part of your future."}}},
{title:'Your AI Journey Continues!',content:'<h3>You\'re a Level 1 AI Thinker! 🎓</h3><p>Congratulations on completing Level 1 of AI Academy! Here\'s what you\'ve learned:</p><ul><li>🧠 <strong>What AI is</strong> — a system that learns from examples to solve problems</li><li>💬 <strong>How to prompt</strong> — specific, clear prompts get better answers</li><li>🧐 <strong>Critical thinking</strong> — AI can be wrong; always fact-check!</li><li>🛡️ <strong>Safety</strong> — protect your privacy and spot deepfakes</li><li>🎨 <strong>Creativity</strong> — AI is a tool to spark ideas, not replace them</li><li>🚀 <strong>The future</strong> — you\'ll help shape how AI is used in the world</li></ul><div class="tip-box">Ready for Level 2? Modules 7–12 go deeper — you\'ll explore neural networks, language AI, ethics, and build your own AI ideas!</div><div class="fun-fact">Every expert in AI started exactly where you are. The curiosity and critical thinking you\'ve built are the real superpowers!</div>'}
]},
{id:6,theme:'theme-teal',icon:'🔬',title:'How AI Actually Thinks: Machine Learning Deep Dive',desc:'Go beyond the basics — explore neural networks, data, and how machines really learn.',xp:100,lessons:[
{title:"Neural Networks: AI's Brain",content:'<h3>Inspired by the Human Brain</h3><p>You learned that AI trains on examples — but HOW does it actually store and use that learning? The answer is a <strong>neural network</strong> — a structure loosely inspired by how neurons in your brain connect.</p><p>Think of a neural network like a chain of decisions:</p><ul><li>🔵 <strong>Input layer</strong> — the raw information goes in (pixels of an image, words of a sentence)</li><li>🟣 <strong>Hidden layers</strong> — the AI processes and transforms the information through thousands of tiny "neurons," each making a small calculation</li><li>🟢 <strong>Output layer</strong> — the final answer comes out ("this is a cat" or "this review is positive")</li></ul><p>Each connection between neurons has a <strong>weight</strong> — a number that says how important that connection is. Training adjusts these weights until the AI gets the right answers.</p><div class="fun-fact">A modern AI model can have billions or even trillions of these tiny weighted connections — more than the number of stars in the Milky Way!</div>'},
{title:'Types of Machine Learning',content:'<h3>Three Ways AI Can Learn</h3><p>Not all AI learns the same way. There are three main styles:</p><ul><li>🎓 <strong>Supervised Learning</strong> — You give the AI labeled examples: "this photo = dog, this photo = cat." The AI learns to match new inputs to the right labels. Used for spam filters, image recognition, and more.</li><li>🔍 <strong>Unsupervised Learning</strong> — The AI gets raw data with NO labels and must find its own patterns. Like sorting a pile of mixed puzzle pieces into groups without knowing what the puzzle looks like.</li><li>🎮 <strong>Reinforcement Learning</strong> — The AI learns by trying things and getting rewards or penalties — like training a dog with treats. This is how AI beats humans at chess and video games!</li></ul><div class="tip-box">Most real-world AI products use a combination of these methods. AlphaGo, which beat the world Go champion, used reinforcement learning!</div>',quiz:{q:'An AI learns to play a video game by trying different moves and getting points when it wins. Which type of learning is this?',options:[{text:'🎓 Supervised Learning',correct:false},{text:'🔍 Unsupervised Learning',correct:false},{text:'🎮 Reinforcement Learning',correct:true},{text:'🧮 Calculator Learning',correct:false}],feedback:{ok:'Correct! Rewards and penalties = reinforcement learning!',bad:'Reinforcement learning uses rewards (points!) to teach the AI through trial and error.'}}},
{title:'Data: The Fuel of AI',content:'<h3>Why Data Is Everything</h3><p>AI is only as good as the data it learns from. <strong>Data</strong> is the collection of examples, facts, images, text, or numbers that an AI trains on.</p><h3>What Makes Good Training Data?</h3><ul><li>📊 <strong>Large quantity</strong> — more examples = better learning</li><li>🌍 <strong>Diverse</strong> — includes many different types of examples, not just one group</li><li>✅ <strong>Accurate</strong> — wrong labels teach the AI wrong answers</li><li>🔄 <strong>Relevant</strong> — the data matches what you want the AI to do</li></ul><div class="warning-box">If an AI is trained mostly on data from one country or group, it may not work well for people from other places. This is why diverse data is so important!</div><h3>The Data Pipeline</h3><p>Before AI ever sees data, humans must collect it, clean it (remove errors), label it, and organize it. This work often takes longer than training the AI itself!</p><div class="fun-fact">It\'s estimated that data preparation takes up to 80% of a data scientist\'s working time. The "boring" parts of AI are actually crucial!</div>'}
]},
{id:7,theme:'theme-indigo',icon:'🗣️',title:'Language AI: How Chatbots Really Work',desc:'Discover how AI understands and generates human language — the science behind chatbots.',xp:100,lessons:[
{title:'Large Language Models (LLMs)',content:'<h3>What Is a Language Model?</h3><p>When you chat with an AI like ChatGPT or Claude, you\'re talking to a <strong>Large Language Model</strong> — or LLM. These are AI systems trained on enormous amounts of text: books, websites, articles, code, and more.</p><p>An LLM doesn\'t "understand" language the way you do. Instead, it learns incredibly detailed patterns about which words tend to follow which other words, and what makes sentences meaningful.</p><h3>How Does It Generate Text?</h3><p>Imagine you\'re playing a prediction game: "The cat sat on the ___." You\'d probably say "mat" or "chair." An LLM does this same prediction — but for thousands of words in a row, producing entire paragraphs!</p><ul><li>📥 You type a prompt (input)</li><li>🔄 The model predicts the most fitting next word, then the next, then the next...</li><li>📤 The result is a full, coherent response</li></ul><div class="fun-fact">GPT-4 was trained on roughly 1 trillion words of text. If you read 1 book per week your whole life, you\'d read about 4,000 books. GPT-4 effectively "read" the equivalent of millions of books!</div>'},
{title:'Tokens: How AI Reads',content:'<h3>AI Doesn\'t Read Letters — It Reads Tokens</h3><p>AI language models don\'t process text letter-by-letter or even word-by-word. They break text into <strong>tokens</strong> — chunks that are often parts of words, whole words, or punctuation.</p><p>For example, the word "unbelievable" might become 3 tokens: <code>un</code> + <code>believ</code> + <code>able</code>. This helps the AI handle new words it\'s never seen before!</p><h3>Why Does This Matter?</h3><ul><li>🧩 Tokens are the "atoms" of language for AI</li><li>📏 AI has a "context window" — a limit on how many tokens it can consider at once (like short-term memory)</li><li>💡 Longer prompts use more tokens, which is why some AI tools have message length limits</li></ul><div class="tip-box">On average, 1 token ≈ 0.75 words in English. A typical paragraph uses about 100 tokens. The context window of modern AI can hold tens of thousands!</div>',quiz:{q:'How does a Large Language Model generate text?',options:[{text:'📚 It looks up answers in an encyclopedia',correct:false},{text:'🔮 It predicts the most fitting next word/token, one at a time, based on patterns',correct:true},{text:'📞 It calls a human expert to write the answer',correct:false},{text:'🗂️ It copies answers from a database',correct:false}],feedback:{ok:"Exactly right! LLMs predict one token at a time — that's the magic!",bad:"LLMs don't look things up — they predict! Each word is the AI's best guess at what comes next."}}},
{title:'AI and Different Languages',content:'<h3>Does AI Work the Same in Every Language?</h3><p>AI language models are often much better in English than in other languages — because most of their training data was in English. But this is changing!</p><ul><li>🌍 Modern AI models are trained on text from dozens of languages</li><li>📉 Languages with less internet content (fewer websites, books online) often get weaker AI performance</li><li>🤝 Researchers around the world are working to make AI equally good in all languages</li></ul><h3>Translation AI</h3><p>AI has revolutionized language translation. Tools like Google Translate and DeepL use neural networks to translate between over 100 languages with impressive accuracy — though they still make cultural and contextual mistakes that only humans would catch.</p><div class="warning-box">Always have a human speaker review important AI translations. Cultural nuance, humor, and idioms are still tricky for AI!</div><div class="fun-fact">The word "data" comes from Latin. Interestingly, Latin has very little representation in modern AI training data — even though it influenced almost every European language!</div>'}
]},
{id:8,theme:'theme-rose',icon:'🎭',title:'AI and Ethics: Doing the Right Thing',desc:'Explore the hard moral questions AI raises — fairness, accountability, and human values.',xp:100,lessons:[
{title:'Who Is Responsible for AI?',content:'<h3>When AI Makes a Mistake, Who\'s to Blame?</h3><p>This is one of the most important questions in AI today. When an AI system makes a wrong or harmful decision, who is responsible?</p><ul><li>👨‍💻 <strong>The developers</strong> who built the AI?</li><li>🏢 <strong>The company</strong> that released it?</li><li>👤 <strong>The user</strong> who gave it instructions?</li><li>🤖 <strong>The AI itself</strong>?</li></ul><p>Right now, AI cannot be legally responsible — only humans and organizations can be. This means the people who build and deploy AI carry a huge responsibility to get it right.</p><div class="fun-fact">Many countries are now creating AI laws and regulations — similar to how we have traffic laws for cars. The EU passed the world\'s first major AI law in 2024!</div><div class="tip-box">This is called AI <strong>accountability</strong> — making sure there\'s always a human responsible for what an AI does.</div>'},
{title:'Algorithmic Fairness',content:'<h3>Can AI Be Unfair Without Meaning To?</h3><p>Yes! This is called <strong>algorithmic bias</strong>, and it\'s a serious issue. Here are real examples:</p><ul><li>⚖️ A hiring AI trained on past resumes was found to penalize women\'s resumes because historically fewer women held those jobs</li><li>🏥 A healthcare AI used in the US recommended less care for Black patients than white patients with the same illness</li><li>📸 Early facial recognition AI had much higher error rates for darker skin tones because training data lacked diversity</li></ul><h3>How Do We Fix This?</h3><ul><li>🔎 <strong>Audit AI</strong> — regularly test for unfair outcomes across different groups</li><li>🌍 <strong>Diverse teams</strong> — people of different backgrounds building AI catch blind spots</li><li>📊 <strong>Diverse data</strong> — ensure training data represents all people fairly</li><li>👁️ <strong>Transparency</strong> — make AI decisions explainable so bias can be spotted</li></ul><div class="warning-box">Fixing AI bias isn\'t just a technical problem — it requires social awareness, diverse teams, and ongoing attention to real-world outcomes.</div>',quiz:{q:'A facial recognition AI has much higher error rates for certain groups of people. What is the most likely cause?',options:[{text:'🔌 The AI needs a software update',correct:false},{text:'📊 The training data lacked diversity — it had far fewer examples from those groups',correct:true},{text:'💡 The AI is deliberately being unfair',correct:false},{text:'📷 The camera quality is too low',correct:false}],feedback:{ok:"Correct! Biased data = biased AI. Diverse training data is critical for fairness.",bad:"The most common cause of AI bias is non-diverse training data — the AI simply hasn't seen enough examples from all groups."}}},
{title:'AI and Human Values',content:'<h3>Teaching AI What Humans Care About</h3><p>One of the hardest problems in AI is <strong>alignment</strong> — making sure AI systems pursue goals that are actually good for people and society, not just technically correct but missing the point.</p><p>Example: If you told an AI "make people happy," a poorly aligned AI might decide everyone should be sedated and feel artificially happy forever. That\'s technically the goal — but not what any human would want!</p><h3>Human Values Are Complicated</h3><ul><li>❤️ We value honesty AND kindness — but sometimes they conflict</li><li>🔒 We value privacy AND safety — but sometimes you need to share info to stay safe</li><li>⚖️ We value freedom AND fairness — but complete freedom can create unfairness</li></ul><p>Teaching AI to navigate these trade-offs is an active area of research called <strong>AI safety</strong> and <strong>AI alignment</strong>.</p><div class="tip-box">Many of the best AI researchers are focused not just on making AI smarter, but on making AI safer and more aligned with human values. It\'s one of the most important jobs of our time!</div>'}
]},
{id:9,theme:'theme-amber',icon:'🏗️',title:'Building With AI: Your First AI Project',desc:'Get hands-on! Learn to design, plan, and think like an AI builder.',xp:100,lessons:[
{title:'The AI Design Process',content:'<h3>How Do You Build an AI Solution?</h3><p>Building with AI follows a repeating cycle — not a straight line. Here are the key steps:</p><ul><li>🎯 <strong>1. Define the Problem</strong> — What specific problem are you solving? Who has this problem? What does "success" look like?</li><li>📊 <strong>2. Collect &amp; Prepare Data</strong> — What information does your AI need to learn from? Where will you get it?</li><li>🏗️ <strong>3. Choose a Model</strong> — What type of AI fits this problem? (classification, generation, prediction?)</li><li>🔧 <strong>4. Train &amp; Test</strong> — Train the AI, then test it on new examples it hasn\'t seen</li><li>📈 <strong>5. Evaluate</strong> — Is it accurate? Is it fair? Are there edge cases where it fails?</li><li>🔄 <strong>6. Improve &amp; Repeat</strong> — Fix problems and go back to step 1. AI development is always iterative!</li></ul><div class="fun-fact">Most AI projects go through this cycle dozens or hundreds of times before they\'re ready to be used by real people!</div>'},
{title:'AI Tools You Can Use Right Now',content:'<h3>Real AI Tools for Students</h3><p>You don\'t have to be a programmer to start building with AI! Here are real tools you can explore:</p><ul><li>🤖 <strong>Teachable Machine</strong> (Google) — Train an image, sound, or pose recognition AI right in your browser — no code needed!</li><li>🎨 <strong>Scratch + ML extension</strong> — Add machine learning to your Scratch projects</li><li>📝 <strong>AI writing tools</strong> — Use Claude, ChatGPT, or similar to help brainstorm, outline, and improve writing</li><li>🎵 <strong>AI music tools</strong> — Tools like Suno let you describe music and generate it</li><li>🖼️ <strong>AI image tools</strong> — Describe an image and watch it appear</li></ul><div class="tip-box">Teachable Machine is especially great for hands-on learning — you can train a model to recognize YOUR drawings, YOUR voice, or YOUR hand gestures!</div><div class="warning-box">Always get permission from a parent or teacher before signing up for new online tools, and never share personal information when creating accounts.</div>',quiz:{q:'Which of the following allows you to train a simple image recognition AI in your browser, with NO coding required?',options:[{text:'💻 Microsoft Word',correct:false},{text:'🤖 Teachable Machine by Google',correct:true},{text:'🎮 Roblox',correct:false},{text:'📧 Gmail',correct:false}],feedback:{ok:"That's it! Teachable Machine is a fantastic hands-on way to experience real ML training.",bad:"Teachable Machine by Google lets you train image/sound AI right in the browser — no code needed!"}}},
{title:'Design Your Own AI Idea',content:'<h3>Think Like an AI Builder! 💡</h3><p>Every great AI tool started as someone\'s idea. Now it\'s your turn. Think about a problem in your school, home, or community that AI might help solve.</p><div class="fun-fact">AI tools have been designed by students your age! The key is identifying a real problem and thinking carefully about how AI could address it — including potential downsides.</div><h3>Your AI Idea Checklist:</h3><ul><li>✅ What problem does it solve?</li><li>✅ Who would use it?</li><li>✅ What data would it need to learn from?</li><li>✅ What type of AI would it use? (recognizing images? generating text? predicting numbers?)</li><li>✅ What could go wrong? How would you keep it fair and safe?</li></ul>',practice:{scenario:'🏗️ Design a simple AI tool that could help students at your school.',hint:'Describe: what it does, who uses it, what data it learns from, and one potential challenge or risk.',placeholder:"My AI idea: e.g., \"An AI that helps students find library books by describing what they're in the mood to read. It would be trained on book summaries and student ratings. A challenge is that it might not know about new books...\""}}
]},
{id:10,theme:'theme-cyan',icon:'🌐',title:'AI in the Real World: Case Studies',desc:'Examine how AI is actually being used in medicine, environment, art, and more — and the trade-offs.',xp:100,lessons:[
{title:'AI Saving Lives: Healthcare',content:'<h3>AI as a Medical Partner</h3><p>One of the most exciting uses of AI is in healthcare — where it\'s already saving lives:</p><ul><li>🩻 <strong>Medical imaging</strong> — AI can analyze X-rays, MRIs, and CT scans to detect cancer, tumors, and fractures sometimes faster and more accurately than human radiologists</li><li>💊 <strong>Drug discovery</strong> — AI can sift through millions of chemical compounds to find promising medicine candidates, cutting years off development time</li><li>🧬 <strong>Genomics</strong> — AI helps decode DNA sequences to identify genetic diseases and predict health risks</li><li>🚑 <strong>Emergency response</strong> — AI systems help route ambulances and predict patient deterioration in hospitals</li></ul><div class="fun-fact">DeepMind\'s AlphaFold AI solved a 50-year-old biology problem: predicting the 3D shape of proteins. This has already accelerated research into treatments for diseases like Parkinson\'s and Alzheimer\'s!</div><div class="warning-box">AI in medicine assists doctors — it doesn\'t replace them. A human doctor always reviews AI findings before any medical decision is made. This is called "human in the loop."</div>'},
{title:'AI and the Environment',content:'<h3>Can AI Help Save the Planet?</h3><p>AI is becoming one of our most powerful tools in fighting climate change:</p><ul><li>🌿 <strong>Precision agriculture</strong> — AI helps farmers use exactly the right amount of water and fertilizer, reducing waste</li><li>🌊 <strong>Ocean monitoring</strong> — AI analyzes satellite images to track deforestation, coral reef bleaching, and ice melt in real time</li><li>⚡ <strong>Smart energy grids</strong> — AI predicts when and where electricity demand will be high, reducing waste from power plants</li><li>🐘 <strong>Wildlife protection</strong> — AI listens to sounds in forests to detect illegal logging and poaching in real time</li></ul><h3>But AI Also Has a Carbon Footprint</h3><p>Training large AI models uses enormous amounts of electricity — sometimes equivalent to the carbon emissions of five cars over their entire lifetime. Researchers are working to make AI greener.</p><div class="tip-box">The same AI that can help the environment also uses significant energy. This is a real trade-off that engineers and policymakers must grapple with.</div>',quiz:{q:'Which of these is a real way AI is being used to help the environment?',options:[{text:'🌧️ AI makes it rain when farmers need water',correct:false},{text:'🌿 AI helps farmers use exactly the right amount of water, reducing waste',correct:true},{text:'☀️ AI powers solar panels directly',correct:false},{text:'🌱 AI plants trees automatically',correct:false}],feedback:{ok:'Correct! Precision agriculture is a powerful real-world AI application.',bad:'Precision agriculture is the answer — AI helps optimize resource use on farms!'}}},
{title:'AI in Art, Music & Journalism',content:'<h3>The Creative Industries and AI</h3><p>AI is transforming creative fields in ways that spark both excitement and debate:</p><ul><li>🖼️ <strong>AI Art</strong> — tools like DALL-E and Midjourney generate images from text. This raises questions: Who owns AI art? What happens to human artists?</li><li>🎵 <strong>AI Music</strong> — AI can compose symphonies, generate songs in any style, and even clone voices. Musicians are debating the ethics of AI-generated music.</li><li>📰 <strong>AI Journalism</strong> — some news outlets use AI to write basic sports scores and financial reports, freeing journalists to focus on in-depth stories</li><li>🎬 <strong>AI Film</strong> — AI is used for visual effects, de-aging actors, and even resurrecting historical footage</li></ul><h3>The Big Debate</h3><p>Should AI-generated creative work be labeled? Should AI companies pay the artists whose work trained their systems? These debates are happening RIGHT NOW in courts, legislatures, and studios around the world.</p><div class="fun-fact">In 2023, Hollywood writers and actors went on strike partly over concerns about AI being used to replace their work. The strikes resulted in new agreements about how AI can and cannot be used in film and TV.</div>'}
]},
{id:11,theme:'theme-violet',icon:'🏆',title:'Becoming an AI Champion: Capstone',desc:"Put it ALL together — apply everything you've learned and earn your AI Academy graduation!",xp:100,lessons:[
{title:"The AI Thinker's Toolkit",content:'<h3>Your Complete AI Toolkit 🧰</h3><p>Over 12 modules you\'ve built a powerful set of skills. Let\'s make sure they\'re all sharp:</p><ul><li>🧠 <strong>AI Foundations</strong> — You know what AI is, how it learns, and where it exists in the world</li><li>💬 <strong>Prompt Engineering</strong> — You can craft specific, effective prompts that get great results</li><li>🧐 <strong>Critical Thinking</strong> — You fact-check AI, spot hallucinations, and recognize bias</li><li>🛡️ <strong>Digital Safety</strong> — You protect your privacy and can identify deepfakes</li><li>🎨 <strong>Creative Partnership</strong> — You use AI as a tool while keeping your own voice</li><li>🔬 <strong>Machine Learning</strong> — You understand neural networks, data, and training types</li><li>🗣️ <strong>Language AI</strong> — You know how LLMs work and why tokens matter</li><li>🎭 <strong>AI Ethics</strong> — You think about fairness, accountability, and human values</li><li>🏗️ <strong>Building with AI</strong> — You can design and plan AI solutions</li><li>🌐 <strong>Real-World AI</strong> — You understand AI in healthcare, environment, and creative fields</li></ul><div class="tip-box">Every one of these skills makes you a more informed, capable, and responsible citizen in an AI-powered world.</div>'},
{title:'Spot the AI Problem!',content:'<h3>Put Your Skills to the Test 🔍</h3><p>Read each scenario and identify the AI issue:</p><div class="fun-fact">Scenario 1: A school uses an AI grading system. Students from one zip code consistently get lower grades — but their teachers say their work is equal to other students. What\'s the likely problem? <strong>→ Algorithmic bias from non-diverse training data!</strong></div><div class="tip-box">Scenario 2: An AI chatbot confidently tells you that a famous scientist was born in 1901, but you can\'t find this confirmed anywhere. What should you do? <strong>→ Fact-check it — this could be an AI hallucination!</strong></div><div class="warning-box">Scenario 3: Your friend wants to use an AI to write their entire science report and not tell the teacher. What are TWO problems with this? <strong>→ Academic dishonesty + the AI might contain factual errors that hurt their grade!</strong></div><p>You identified all three! That\'s the critical thinking of a real AI thinker.</p>',quiz:{q:'A job application AI was trained only on resumes of people hired over the past 20 years, mostly men. What problem will this AI likely have?',options:[{text:'🔌 It will crash when too many people apply',correct:false},{text:'⚖️ It will be biased against women, since it learned that "good candidates" look like the men in its training data',correct:true},{text:'📄 It will only read PDF resumes',correct:false},{text:'⏰ It will be very slow',correct:false}],feedback:{ok:"Exactly! Biased historical data creates biased AI. This is a real problem in hiring AI today.",bad:"The historical data was mostly men, so the AI learned to favor resumes that look like men's resumes — that's algorithmic bias!"}}},
{title:'Graduation: Your AI Manifesto',content:'<h3>🎓 Congratulations, AI Academy Graduate!</h3><p>You\'ve completed all 12 modules of AI Academy. You\'ve gone from understanding what AI is all the way to thinking about ethics, building ideas, and examining real-world impacts.</p><h3>Write Your Personal AI Manifesto</h3><p>A manifesto is a statement of your beliefs and commitments. As an AI-literate person, what do YOU stand for?</p><div class="fun-fact">I will use AI as a tool — not a replacement for my own thinking, creativity, or effort.</div><div class="tip-box">I will fact-check AI responses and think critically before sharing or using AI-generated information.</div><div class="warning-box">I will protect my privacy, be honest about using AI, and speak up when I see AI being used unfairly.</div><p style="font-weight:800;color:#1e1b4b;font-size:1.05rem;">The world needs people who understand AI AND know how to keep it human. That person is you. 🌟</p>',practice:{scenario:'🏆 Write your personal AI Manifesto — 3 to 5 commitments you make as an AI-literate student and future citizen.',hint:"Think about: how you'll use AI ethically, how you'll protect yourself, how you'll help others understand AI, and what kind of future you want to help build.",placeholder:'My AI Manifesto: e.g., "I commit to always fact-checking AI before sharing information. I will use AI to enhance my creativity, never to replace it. I will speak up when I see AI being used unfairly..."'}}
]}
];

let state={xp:0,completedLessons:{},completedModules:{}};
try{const s=sessionStorage.getItem('aiAcademyState');if(s)state=JSON.parse(s);}catch(e){}
function save(){try{sessionStorage.setItem('aiAcademyState',JSON.stringify(state));}catch(e){}}
function updateXP(){const max=modules.reduce((a,m)=>a+m.xp,0);const pct=Math.min(100,(state.xp/max)*100);document.getElementById('xpFill').style.width=pct+'%';document.getElementById('xpNum').textContent=state.xp+' / '+max;}
function addXP(n){state.xp+=n;save();updateXP();}
function renderModules(){
  const grid=document.getElementById('moduleGrid');grid.innerHTML='';
  modules.forEach((mod,mi)=>{
    if(mi===0){const d=document.createElement('div');d.className='section-divider';d.innerHTML='<div class="section-divider-line"></div><div class="section-divider-badge">⭐ Level 1: AI Foundations (Modules 1–6)</div><div class="section-divider-line right"></div>';grid.appendChild(d);}
    if(mi===6){const d=document.createElement('div');d.className='section-divider';d.innerHTML='<div class="section-divider-line"></div><div class="section-divider-badge">🚀 Level 2: AI Advanced (Modules 7–12)</div><div class="section-divider-line right"></div>';grid.appendChild(d);}
    const total=mod.lessons.length;
    const done=mod.lessons.filter((_,li)=>state.completedLessons[`${mi}-${li}`]).length;
    const pct=Math.round((done/total)*100);
    const card=document.createElement('div');
    card.className=`module-card ${mod.theme}${state.completedModules[mi]?' completed':''}`;
    card.innerHTML=`<div class="card-header"><span class="card-icon">${mod.icon}</span><div class="card-title">${mod.title}</div><div class="card-desc">${mod.desc}</div></div><div class="card-footer"><div class="lessons-count">📖 ${done}/${total} lessons</div><div class="progress-pill">${pct}%</div></div>`;
    card.addEventListener('click',()=>openModule(mi));
    grid.appendChild(card);
  });
}
let currentModule=null,currentLesson=0;
function openModule(mi){currentModule=mi;currentLesson=0;renderModal();document.getElementById('overlay').classList.add('open');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';renderModules();}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
function renderModal(){
  const mod=modules[currentModule];
  const themes={'theme-sky':'linear-gradient(135deg,#e0f2fe,#f0f9ff)','theme-purple':'linear-gradient(135deg,#ede9fe,#f5f3ff)','theme-pink':'linear-gradient(135deg,#fce7f3,#fdf2f8)','theme-green':'linear-gradient(135deg,#dcfce7,#f0fdf4)','theme-yellow':'linear-gradient(135deg,#fef9c3,#fefce8)','theme-orange':'linear-gradient(135deg,#ffedd5,#fff7ed)','theme-teal':'linear-gradient(135deg,#ccfbf1,#f0fdfa)','theme-indigo':'linear-gradient(135deg,#e0e7ff,#eef2ff)','theme-rose':'linear-gradient(135deg,#ffe4e6,#fff1f2)','theme-amber':'linear-gradient(135deg,#fef3c7,#fffbeb)','theme-cyan':'linear-gradient(135deg,#cffafe,#ecfeff)','theme-violet':'linear-gradient(135deg,#ede9fe,#f5f3ff)'};
  document.getElementById('modalHeader').style.background=themes[mod.theme]||'#f8fafc';
  document.getElementById('modalLessonNum').textContent=`Module ${currentModule+1} of ${modules.length}`;
  document.getElementById('modalTitle').textContent=mod.title;
  const starsEl=document.getElementById('modalStars');starsEl.innerHTML='';
  const dc=mod.lessons.filter((_,li)=>state.completedLessons[`${currentModule}-${li}`]).length;
  for(let i=0;i<mod.lessons.length;i++){const s=document.createElement('span');s.textContent=i<dc?'⭐':'☆';starsEl.appendChild(s);}
  const nav=document.getElementById('lessonNav');nav.innerHTML='';
  mod.lessons.forEach((les,li)=>{const btn=document.createElement('button');btn.className='lesson-tab'+(li===currentLesson?' active':'')+(state.completedLessons[`${currentModule}-${li}`]?' done':'');btn.textContent=`${li+1}. ${les.title}`;btn.addEventListener('click',()=>{currentLesson=li;renderLessonContent();updateTabs();});nav.appendChild(btn);});
  renderLessonContent();
}
function updateTabs(){document.getElementById('lessonNav').querySelectorAll('.lesson-tab').forEach((t,i)=>{t.classList.toggle('active',i===currentLesson);t.classList.toggle('done',!!state.completedLessons[`${currentModule}-${i}`]);});}
function renderLessonContent(){
  const mod=modules[currentModule],lesson=mod.lessons[currentLesson];
  const key=`${currentModule}-${currentLesson}`,done=!!state.completedLessons[key];
  let html=`<div class="lesson-panel visible">${lesson.content}`;
  if(lesson.quiz){const q=lesson.quiz;html+=`<div class="quiz-block"><h3>🧩 Quick Check: ${q.q}</h3><div class="quiz-options">`;q.options.forEach((opt,oi)=>{html+=`<button class="quiz-opt${done&&opt.correct?' correct':''}" onclick="answerQuiz(${oi})" ${done?'disabled':''}>${opt.text}</button>`;});html+=`</div><div class="quiz-feedback${done?' show ok':''}" id="quizFeedback">${done?'✅ '+q.feedback.ok:''}</div></div>`;}
  if(lesson.practice){const pr=lesson.practice;html+=`<div class="prompt-practice"><h3>🎯 Try It: Write a Prompt!</h3><p><strong>Scenario:</strong> ${pr.scenario}</p><p><em>💡 ${pr.hint}</em></p><div class="prompt-input-wrap"><textarea class="prompt-textarea" id="practiceInput" placeholder="${pr.placeholder}"></textarea><button class="send-btn" onclick="scorePractice()">⬆️</button></div><div class="ai-response-wrap" id="practiceResponse"><div class="ai-response" id="practiceText"></div><div class="prompt-score" id="practiceScore"></div></div></div>`;}
  if(!done){html+=`<button class="complete-btn" onclick="completeLesson()">✅ Mark as Complete – Earn XP!</button>`;}
  else{const iL=currentLesson===mod.lessons.length-1,iLM=currentModule===modules.length-1;if(!iL)html+=`<button class="complete-btn" style="background:linear-gradient(135deg,#8b5cf6,#6d28d9)" onclick="nextLesson()">➡️ Next Lesson</button>`;else if(!iLM)html+=`<button class="complete-btn" style="background:linear-gradient(135deg,#f97316,#ea580c)" onclick="closeModal()">🚀 Module Complete! Go to Dashboard</button>`;else html+=`<button class="complete-btn" style="background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#1e1b4b" onclick="closeModal()">🏆 Course Complete! Amazing Work!</button>`;}
  html+='</div>';document.getElementById('lessonContent').innerHTML=html;
}
function answerQuiz(oi){const q=modules[currentModule].lessons[currentLesson].quiz;const opts=document.querySelectorAll('.quiz-opt');opts.forEach(o=>o.disabled=true);const ok=q.options[oi].correct;opts[oi].classList.add(ok?'correct':'wrong');opts.forEach((o,i)=>{if(q.options[i].correct)o.classList.add('correct');});const fb=document.getElementById('quizFeedback');fb.classList.add('show',ok?'ok':'bad');fb.textContent=(ok?'✅ ':'❌ ')+(ok?q.feedback.ok:q.feedback.bad);}
function scorePractice(){const input=document.getElementById('practiceInput').value.trim();if(!input)return;let score=0,words=input.split(/\s+/).length;if(words>=8)score++;if(/grade|year|age|\d+th|\d+rd|\d+nd|\d+st/i.test(input))score++;if(/list|bullet|step|explain|describe|format|paragraph/i.test(input))score++;if(/for|like|as if/i.test(input))score++;if(words>=15)score++;const R=[{min:0,max:1,txt:'🟡 <strong>Needs work!</strong> Your prompt is very short. Try adding more context, your grade level, and what format you want.',pts:'⭐ 1/5 stars'},{min:2,max:2,txt:'🟠 <strong>Getting better!</strong> You have some detail, but try also specifying who you are and what format you want.',pts:'⭐⭐ 2/5 stars'},{min:3,max:3,txt:'🔵 <strong>Good prompt!</strong> You\'re including helpful context. Try also specifying a tone or style.',pts:'⭐⭐⭐ 3/5 stars'},{min:4,max:4,txt:'🟢 <strong>Great prompt!</strong> You\'ve given good context and format. Very close to a professional-level prompt!',pts:'⭐⭐⭐⭐ 4/5 stars'},{min:5,max:99,txt:'🌟 <strong>Excellent prompt!</strong> Specific, clear, includes context, format, and purpose. That\'s prompt engineering mastery!',pts:'⭐⭐⭐⭐⭐ 5/5 stars'}];const r=R.find(x=>score>=x.min&&score<=x.max)||R[0];document.getElementById('practiceText').innerHTML=r.txt;document.getElementById('practiceScore').innerHTML=r.pts;document.getElementById('practiceResponse').classList.add('show');}
function completeLesson(){const key=`${currentModule}-${currentLesson}`;if(state.completedLessons[key])return;state.completedLessons[key]=true;const mod=modules[currentModule],xpE=Math.round(mod.xp/mod.lessons.length);addXP(xpE);const allDone=mod.lessons.every((_,li)=>state.completedLessons[`${currentModule}-${li}`]);if(allDone&&!state.completedModules[currentModule]){state.completedModules[currentModule]=true;showToast('🏆',`Module "${mod.title.split(':')[0]}" Complete! +${mod.xp} XP!`);}else showToast('⭐',`Lesson Complete! +${xpE} XP earned!`);save();renderModal();updateTabs();}
function nextLesson(){currentLesson++;renderLessonContent();updateTabs();document.getElementById('modal').scrollTo({top:0,behavior:'smooth'});}
let toastTimer;
function showToast(icon,msg){clearTimeout(toastTimer);document.getElementById('toastIcon').textContent=icon;document.getElementById('toastMsg').textContent=msg;const t=document.getElementById('toast');t.classList.add('show');toastTimer=setTimeout(()=>t.classList.remove('show'),3200);}
renderModules();updateXP();
</script>
</body>
</html>
